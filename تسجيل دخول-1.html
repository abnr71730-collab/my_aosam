<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول — عقاراتي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="تسجيل دخول .css">
</head>
<body>

    <div class="box">
        <div class="login">
            <div class="loginbx">

                <!-- العنوان -->
                <h2>
                    <i class="fa-solid fa-right-to-bracket"></i>
                    تسجيل الدخول
                    <i class="fa-solid fa-heart"></i>
                </h2>

                <!-- تبديل الدور: مستخدم / أدمن -->
                <div class="role-wrap">
                    <button class="role-btn active" id="userBtn" onclick="setRole('user')">
                        <i class="fas fa-user"></i> مستخدم
                    </button>
                    <button class="role-btn" id="adminBtn" onclick="setRole('admin')">
                        <i class="fas fa-shield-halved"></i> مدير
                    </button>
                </div>

                <!-- رسالة خطأ -->
                <div class="error-msg" id="errorMsg">
                    <i class="fas fa-circle-exclamation"></i>
                    <span id="errorText">اسم المستخدم أو كلمة المرور غير صحيحة</span>
                </div>

                <!-- حقول الإدخال -->
                <div class="field-wrap">
                    <i class="fas fa-user field-icon"></i>
                    <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
                </div>

                <div class="field-wrap">
                    <i class="fas fa-lock field-icon"></i>
                    <input type="password" id="password" placeholder="كلمة المرور">
                    <button type="button" class="eye-btn" onclick="togglePass()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>

                <!-- زر الدخول -->
                <input type="submit" value="دخول" id="submitBtn" onclick="handleLogin()">

                <!-- تلميح البيانات -->
                <div class="hint-box" id="hintBox">
                    <i class="fas fa-info-circle"></i>
                    <span id="hintText">مستخدم: <b>user</b> | كلمة المرور: <b>user123</b></span>
                </div>

                <!-- روابط -->
                <div class="group">
                    <a href="#">نسيت كلمة المرور؟</a>
                    <a href="index2.htm">تصفح كضيف</a>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ── بيانات الدخول ─────────────────────────
        const CREDS = {
            user:  { username: 'user',  password: 'user123'  },
            admin: { username: 'admin', password: 'admin123' }
        };
        let role = 'user';

        // ── تبديل الدور ───────────────────────────
        const HINTS = {
            user:  'مستخدم: <b>user</b> | كلمة المرور: <b>user123</b>',
            admin: 'مستخدم: <b>admin</b> | كلمة المرور: <b>admin123</b>'
        };
        function setRole(r) {
            role = r;
            document.getElementById('userBtn').classList.toggle('active', r === 'user');
            document.getElementById('adminBtn').classList.toggle('active', r === 'admin');
            document.getElementById('hintText').innerHTML = HINTS[r];
            hideError();
        }

        // ── إظهار/إخفاء كلمة المرور ──────────────
        function togglePass() {
            const inp  = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            const show = inp.type === 'password';
            inp.type       = show ? 'text' : 'password';
            icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
        }

        // ── رسائل الخطأ ───────────────────────────
        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').style.display = 'flex';
        }
        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        // ── تسجيل الدخول ──────────────────────────
        function handleLogin() {
            hideError();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const btn  = document.getElementById('submitBtn');

            if (!user || !pass) {
                showError('يرجى تعبئة اسم المستخدم وكلمة المرور');
                return;
            }

            btn.value    = '...جارٍ التحقق';
            btn.disabled = true;

            setTimeout(() => {
                const c = CREDS[role];
                if (user === c.username && pass === c.password) {
                    window.location.href = role === 'admin' ? 'admin/index.html' : 'index2.htm';
                } else {
                    btn.value    = 'دخول';
                    btn.disabled = false;
                    showError(role === 'admin'
                        ? 'بيانات المدير غير صحيحة، حاول مجدداً'
                        : 'اسم المستخدم أو كلمة المرور غير صحيحة');
                }
            }, 900);
        }
    </script>
</body>
</html>
